<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

    <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
    
    <title>Frontend Mentor | Blog preview card</title>

    <!-- Figtree Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Figtree:ital,wght@0,300..900;1,300..900&display=swap" rel="stylesheet">
    
    <!-- CSS File -->
    <link rel="stylesheet" href="styles.css">
    
  </head>
  <body>
    <main>
      <section id="blog-card">
        <img
          src="assets/images/illustration-article.svg"
          alt="Nice design image revolving HTML and CSS"
        >
        <p id="topic">Learning</p>
        <p id="date">Published 21 Dec 2023</p>

        <h1>HTML & CSS foundations</h1>

        <p id="info">These languages are the backbone of every website, defining structure, content, and presentation.</p>
        
        <div id="user">
          <img
            src="assets/images/image-avatar.webp"
            alt="Profile picture of the user"
          >
          <span>Greg Hooper</span>
        </div>
      </section>
    </main>
  </body>
</html>
